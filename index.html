<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>PSYFI x Kurate — Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ── Password gate ───────────────────────────────────────── */
#gate{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
  opacity:1;
}

.gate-card{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  padding:52px 48px 44px;
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(52,17,75,0.1);
  border-radius:20px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 8px 48px rgba(52,17,75,0.08),0 2px 12px rgba(52,17,75,0.05);
  width:min(360px,90vw);
  animation:gate-in .55s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes gate-in{
  from{opacity:0;transform:translateY(14px) scale(.97)}
  to{opacity:1;transform:none}
}

.gate-brand img{
  width:64px;height:64px;
  object-fit:contain;display:block;
  margin:0 auto
}

.gate-hint{
  font-size:.76rem;color:#9b8aaa;letter-spacing:.01em;text-align:center;
  line-height:1.5;margin-top:-14px
}

.gate-input-wrap{
  position:relative;width:100%
}
#pwInput{
  width:100%;
  padding:13px 46px 13px 16px;
  border:1.5px solid rgba(52,17,75,0.18);
  border-radius:10px;
  font-size:.9rem;font-family:inherit;
  color:#1a0b24;background:rgba(255,255,255,0.9);
  outline:none;
  transition:border-color .18s,box-shadow .18s;
  letter-spacing:.02em;
}
#pwInput::placeholder{letter-spacing:.01em;color:#b8a8c8}
#pwInput:focus{
  border-color:#34114b;
  box-shadow:0 0 0 3px rgba(52,17,75,0.09)
}
#pwInput.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{
  10%,90%{transform:translateX(-3px)}
  20%,80%{transform:translateX(4px)}
  30%,50%,70%{transform:translateX(-5px)}
  40%,60%{transform:translateX(5px)}
}
#pwInput.error{border-color:#ff6e60;box-shadow:0 0 0 3px rgba(255,110,96,0.12)}

.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:2px;
  color:#b8a8c8;transition:color .15s;display:flex;align-items:center
}
.eye-btn:hover{color:#34114b}

#gateBtn{
  width:100%;padding:13px;
  background:#34114b;color:#fff;
  border:none;border-radius:10px;
  font-size:.88rem;font-family:inherit;font-weight:600;
  cursor:pointer;letter-spacing:.02em;
  transition:background .15s,transform .12s,box-shadow .15s;
  box-shadow:0 2px 12px rgba(52,17,75,0.22)
}
#gateBtn:hover{background:#4a1a6e;box-shadow:0 4px 18px rgba(52,17,75,0.28)}
#gateBtn:active{transform:scale(.98)}

#gateErr{
  font-size:.72rem;color:#ff6e60;
  height:16px;text-align:center;
  transition:opacity .2s
}
/* ── End password gate ───────────────────────────────────── */

:root {
  --bg: #ffffff;
  --surface: #f9f8fb;
  --surface2: #f0ecf5;
  --border: #e6e0ed;
  --text: #1a0b24;
  --muted: #7c6a8a;
  --main: #34114b;
  --accent: #ff6e60;
  --main-soft: rgba(52,17,75,0.07);
  --accent-soft: rgba(255,110,96,0.1);
  --sidebar-w: 260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-size:18px;
  -webkit-text-size-adjust:100%;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',system-ui,sans-serif;
  line-height:1.5;
  overflow:hidden;
}

/* ── Header ─────────────────────────────────────────────── */
header{
  height:46px;
  padding:0 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:sticky;top:0;z-index:100;
  background:var(--bg);
}
.header-left{display:flex;align-items:center;gap:10px}
.sidebar-toggle{
  width:32px;height:32px;border:1.5px solid var(--border);border-radius:6px;
  background:transparent;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0
}
.sidebar-toggle:hover{color:var(--main);border-color:var(--main);background:var(--main-soft)}
.site-title{
  font-size:.82rem;font-weight:600;letter-spacing:.01em;
  color:var(--main);white-space:nowrap
}
.legend{display:flex;gap:16px;font-size:.72rem;color:var(--muted)}
.legend-item{display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.content{background:var(--main)}
.dot.ux{background:var(--accent)}

/* ── Layout ──────────────────────────────────────────────── */
.app{display:flex;height:calc(100vh - 46px);overflow:hidden}


/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
  padding:10px 0;background:var(--surface);
  transition:width .2s ease,min-width .2s ease,opacity .2s ease,padding .2s ease;
  flex-shrink:0
}
.sidebar.collapsed{width:0;min-width:0;padding:0;opacity:0;pointer-events:none;border-right:none}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.section-label{
  padding:10px 14px 3px;
  font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);font-weight:700;white-space:nowrap
}
.nav-item{
  width:100%;border:0;display:flex;align-items:center;gap:8px;
  padding:7px 14px;background:transparent;cursor:pointer;
  border-left:2.5px solid transparent;font-size:.78rem;font-family:inherit;
  text-align:left;color:var(--muted);white-space:nowrap;
  transition:all .15s
}
.nav-item:hover{background:var(--main-soft);color:var(--text)}
.nav-item.active{background:var(--main-soft);border-left-color:var(--main);color:var(--main);font-weight:600}
.nav-item .badge{
  margin-left:auto;font-size:.58rem;background:var(--surface2);
  border-radius:8px;padding:1px 6px;color:var(--muted);flex-shrink:0
}
.nav-item.active .badge{background:rgba(52,17,75,.15);color:var(--main)}
.nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--border)}
.nav-item.has-notes .nav-dot{background:var(--main)}

/* ── Main ────────────────────────────────────────────────── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}

/* ── Screen viewer ───────────────────────────────────────── */
.screen-viewer{
  flex:1;min-height:0;
  padding:24px 48px 20px;
  display:flex;align-items:flex-start;gap:28px;
  overflow-x:auto;overflow-y:hidden;
  scroll-behavior:smooth;
  scroll-padding-inline:48px;
  scroll-snap-type:x proximity;
}
.screen-viewer::-webkit-scrollbar{height:5px}
.screen-viewer::-webkit-scrollbar-track{background:var(--surface)}
.screen-viewer::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.screen-viewer::-webkit-scrollbar-thumb:hover{background:var(--muted)}

.review-card{
  flex:0 0 min(480px,calc(100vw - 340px));
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  gap:18px;scroll-snap-align:center;
  opacity:.45;transform:scale(.97);
  transition:opacity .25s ease,transform .25s ease;
  /* no contain — allows comment card to overflow card boundary */
  overflow:visible
}
.review-card.active-screen,.review-card:hover{opacity:1;transform:scale(1)}

.phone-wrapper{
  position:relative;flex-shrink:0;
  width:min(250px,calc(100vw - 380px));
  overflow:visible;
  filter:drop-shadow(0 16px 40px rgba(52,17,75,.15))
}
.phone-frame{
  position:relative;overflow:hidden;
  border-radius:32px;background:#f5f0f8;
  transition:transform .25s ease
}
/* Purple corner overlay — masks screenshot white edges */
.phone-frame::after{
  content:'';
  position:absolute;inset:0;
  border-radius:inherit;
  box-shadow:inset 0 0 0 2px var(--main);
  pointer-events:none;z-index:10
}
.review-card.active-screen .phone-frame{transform:translateY(-2px)}
.phone-img{
  width:100%;
  height:auto;
  display:block;
  max-height:calc(100vh - 180px);
  object-fit:contain;object-position:top
}

/* ── Pins ─────────────────────────────────────────────────── */
.pin{
  position:absolute;transform:translate(-50%,-50%);
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.62rem;font-weight:700;z-index:10;
  border:2px solid rgba(255,255,255,.7);
  box-shadow:0 4px 14px rgba(0,0,0,.2);
  opacity:0;transition:opacity .2s,transform .18s,box-shadow .18s;
  font-family:inherit;user-select:none
}
.pin.ready{opacity:.9}
.pin.content{background:var(--main);color:#fff}
.pin.ux{background:var(--accent);color:#fff}
.pin:hover,.pin.active{
  transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:1
}

/* ── Feedback panel ──────────────────────────────────────── */
.feedback-panel{width:min(560px,100%);text-align:center}
.screen-meta{color:var(--muted);font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.screen-title-area h2{font-size:1.35rem;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.empty-state p{font-size:.8rem;color:var(--muted);line-height:1.6;margin-top:6px}

/* ── Comment popup — absolute inside .phone-wrapper, scrolls with card ── */
.card-popup{
  position:absolute;
  width:260px;
  display:none;
  z-index:30;
}
.comment-card{
  border:1px solid rgba(52,17,75,.18);border-radius:10px;padding:10px 12px;
  background:#ffffff !important;
  box-shadow:0 8px 28px rgba(52,17,75,.16),0 2px 6px rgba(52,17,75,.08);
  text-align:left
}
.comment-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.comment-type{font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.comment-type.content{color:var(--main)}
.comment-type.ux{color:var(--accent)}
.comment-title{color:var(--text);font-weight:600;line-height:1.25;font-size:.78rem}
.comment-close{
  width:20px;height:20px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .12s
}
.comment-close:hover{border-color:var(--main);color:var(--main)}
.comment-label{margin-top:8px;margin-bottom:2px;color:var(--muted);font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.comment-copy{color:var(--text);font-size:.76rem;line-height:1.55}

/* ── Nav bar ─────────────────────────────────────────────── */
/* ── Bottom-right logo ───────────────────────────────────── */
.corner-logo-fixed{
  position:fixed;bottom:18px;right:18px;z-index:90;
  width:36px;height:36px;object-fit:contain;
  opacity:.55;transition:opacity .15s
}
.corner-logo-fixed:hover{opacity:1}

/* ── Modal ───────────────────────────────────────────────── */
.modal-backdrop{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(26,11,36,.5);opacity:0;pointer-events:none;transition:opacity .2s
}
.modal-backdrop.open{opacity:1;pointer-events:auto}
.modal{
  width:min(480px,100%);border:1.5px solid var(--border);
  border-radius:12px;background:var(--bg);
  box-shadow:0 24px 80px rgba(52,17,75,.18);
  transform:translateY(10px) scale(.98);transition:transform .2s
}
.modal-backdrop.open .modal{transform:none}
.modal-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  padding:16px 18px 12px;border-bottom:1.5px solid var(--border)
}
.modal-kicker{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.modal-kicker.content{color:var(--main)}
.modal-kicker.ux{color:var(--accent)}
.modal-title{font-size:1.15rem;font-weight:700;line-height:1.2;letter-spacing:-.01em}
.modal-close{
  width:28px;height:28px;border:1.5px solid var(--border);border-radius:6px;
  background:var(--surface);color:var(--text);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s
}
.modal-close:hover{border-color:var(--main);background:var(--main-soft);color:var(--main)}
.modal-body{padding:16px 18px 18px}
.modal-section+.modal-section{margin-top:14px}
.modal-label{margin-bottom:4px;color:var(--muted);font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.modal-copy{color:var(--text);font-size:.88rem;line-height:1.65}


/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:820px){
  header{padding:0 14px;height:auto;padding-top:10px;padding-bottom:10px;flex-wrap:wrap;gap:8px}
  .app{display:block;height:auto;overflow:auto}
  .sidebar{width:100%!important;min-width:0!important;max-height:140px;border-right:none;border-bottom:1.5px solid var(--border);opacity:1!important;pointer-events:auto!important}
  .sidebar.collapsed{max-height:0;padding:0}
  .screen-viewer{padding:20px 16px 24px;scroll-padding-inline:16px;gap:16px}
  .review-card{flex-basis:calc(100vw - 32px);opacity:1;transform:none}
  .phone-wrapper{width:min(340px,calc(100vw - 48px));max-height:none}
  .phone-img{max-height:none}
  .inline-comment{width:min(360px,100%)}
}
</style>
</head>
<body>

<!-- ── Password gate overlay ─────────────────────────────── -->
<div id="gate" role="dialog" aria-modal="true" aria-label="Enter password">
  <div class="gate-card">
    <div class="gate-brand"><img src="Logo.jpeg" alt="PSYFI"/></div>
    <p class="gate-hint">Enter password to continue</p>
    <div class="gate-input-wrap">
      <input id="pwInput" type="password" placeholder="Password"
        autocomplete="off" spellcheck="false"/>
      <button class="eye-btn" type="button" onclick="toggleEye()" tabindex="-1" aria-label="Show password">
        <!-- eye open -->
        <svg id="eyeShow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <!-- eye off/hidden -->
        <svg id="eyeHide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <button id="gateBtn" type="button" onclick="unlock()">Continue</button>
    <div id="gateErr" style="opacity:0">Incorrect password. Try again.</div>
  </div>
</div>
<!-- ── End gate ───────────────────────────────────────────── -->

<header>
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" type="button" title="Toggle sidebar">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <rect x="1" y="3" width="13" height="1.5" rx=".75" fill="currentColor"/>
        <rect x="1" y="6.75" width="13" height="1.5" rx=".75" fill="currentColor"/>
        <rect x="1" y="10.5" width="13" height="1.5" rx=".75" fill="currentColor"/>
      </svg>
    </button>
    <span class="site-title">Kurate: UX Research Feedback</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot content"></div>Feature / Content</div>
    <div class="legend-item"><div class="dot ux"></div>UI / UX</div>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="screen-viewer" id="screenViewer"></div>
  </div>
</div>

<div class="modal-backdrop" id="feedbackModal" onclick="closeModal(event)">
  <section class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div><div class="modal-kicker" id="modalType"></div><h2 class="modal-title" id="modalTitle"></h2></div>
      <button class="modal-close" type="button" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section"><div class="modal-label">What</div><div class="modal-copy" id="modalWhat"></div></div>
      <div class="modal-section"><div class="modal-label">Why</div><div class="modal-copy" id="modalWhy"></div></div>
    </div>
  </section>
</div>

<script>
const screens = [

// ── ONBOARDING ───────────────────────────────────────────────────────────────
{id:"splash",page:2,title:"Splash Screen",section:"Onboarding",img_src:"assets/screens/01-splash-screen.jpg",
annotations:[
  {x:63,y:64,type:"content",label:"Tagline Copy",what:"\"What you consume becomes who you are\" → Kurate what you consume / Share what shapes you / The Vault for things worth passing on",why:"It rewards passive behaviour (consuming) rather than the action we want (sharing). Identity-framing at onboarding is premature — users haven't yet done anything to feel proud of. It creates a subtle pressure ('this defines you') that can actually inhibit first-time sharing."},
  {x:63,y:74,type:"content",label:"Sub-copy",what:"\"Grow with the 100 minds you care about\" → Kurated bits by inspired minds / Kuration by people, not algorithms",why:"Given that users read this as knowledge management and consumption is private by nature, the sub-tagline shouldn't promise social energy the product doesn't deliver. It should make following the right minds feel like the unlock."},
  {x:63,y:22,type:"ux",label:"Background Grid",what:"The grid behind the circular logo adds noise. Remove it — Kurate logo could be bigger.",why:"Reducing clutter on the first screen a user ever sees increases brand salience and confidence."},
  {x:63,y:10,type:"ux",label:"Logo Size",what:"\"Kurate\" wordmark could be larger",why:"Brand salience is critical on the splash screen — it should feel authoritative, not tentative."}
]},

{id:"mobile_entry",page:3,title:"Enter Mobile Number",section:"Onboarding",img_src:"assets/screens/02-enter-mobile-number.jpg",
annotations:[
  {x:63,y:12,type:"content",label:"Header Tagline",what:"\"Pick your circle, build your taste\" → The internet, kurated by people you trust / The internet, kurated to inspire / Kurations worth your while",why:"'Pick your circle' implies a social network to manage — cognitive front-loading. 'Taste' skews toward aesthetic curation (fashion, food) which may not match the intellectual/intentional tone being built."},
  {x:63,y:35,type:"content",label:"OTP Helper Text",what:"\"You will get an OTP on the provided number\" → You will receive an OTP on the provided number",why:"More polished phrasing. Small copy improvements build subconscious trust in the product."}
]},

{id:"mobile_entry_cta",page:4,title:"Mobile Number — Active CTA",section:"Onboarding",img_src:"assets/screens/03-mobile-number-active-cta.jpg",
annotations:[
  {x:63,y:50,type:"ux",label:"Progress Bar Missing",what:"Add a progress bar showing how far through the sign-up process the user is",why:"Salience ensures fewer drop-offs — people are less likely to abandon when they can see the finish line."},
  {x:63,y:28,type:"content",label:"WTF Early Access Banner",what:"\"12345 members get early access to WTF events and meetups. Want in?\"",why:"Users appreciate the offline reach that WTF has. Social proof + framing around real-world community could push opt-ins."}
]},

{id:"verify_empty",page:5,title:"Verify Mobile — Empty",section:"Onboarding",img_src:"assets/screens/04-verify-mobile-empty.jpg",annotations:[]},
{id:"verify_otp",page:6,title:"Verify Mobile — OTP Entry",section:"Onboarding",img_src:"assets/screens/05-verify-mobile-otp-entry.jpg",annotations:[]},

{id:"verify_success",page:7,title:"Verification Successful",section:"Onboarding",img_src:"assets/screens/06-verification-successful.jpg",
annotations:[
  {x:63,y:72,type:"content",label:"Confirmation Copy — Redundant",what:"\"Thank you! Your phone number has been verified.\" → Remove. 'Verification successful' does the job.",why:"Shorter is cleaner. The modal state already communicates success — the sentence adds no value."},
  {x:63,y:56,type:"ux",label:"Overlapping Modal",what:"Verification modal overlaps OTP input boxes → Reduce size or redesign modal placement.",why:"Not clean visually. A smaller, better-positioned confirmation avoids the clash."}
]},

{id:"name_typing",page:8,title:"What to Call You — Typing",section:"Onboarding",img_src:"assets/screens/07-what-to-call-you-typing.jpg",
annotations:[
  {x:63,y:18,type:"content",label:"Screen Heading",what:"\"What would you like us to call you?\" → What does your circle call you? / How can your friends find you? / What should people call you? Remove the subtext.",why:"'Us' implies a service relationship rather than a peer social network. The tone should feel mutual, not institutional."},
  {x:63,y:42,type:"ux",label:"'Name' Label — Redundant",what:"'Name' label above the text box is redundant",why:"The placeholder text already communicates this. Removing it keeps the UI minimal and focused."}
]},

{id:"name_filled",page:9,title:"What to Call You — Filled",section:"Onboarding",img_src:"assets/screens/08-what-to-call-you-filled.jpg",
annotations:[
  {x:63,y:50,type:"ux",label:"Profile Preview Missing",what:"Show a snapshot of what their profile looks like when another user searches for their name",why:"Makes sign-up feel aspirational and personal — a forward-looking hook rather than a form to fill."}
]},

{id:"username_empty",page:10,title:"Create Username — Empty",section:"Onboarding",img_src:"assets/screens/09-create-username-empty.jpg",
annotations:[

// ── State ──────────────────────────────────────────────────────────────────
let currentIdx = 0, activePin = null, sidebarOpen = true;

function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// ── Sidebar toggle ─────────────────────────────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click',()=>{
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);
});

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let last='',html='';
  screens.forEach((s,i)=>{
    if(s.section!==last){html+=`<div class="section-label">${esc(s.section)}</div>`;last=s.section;}
    const has=s.annotations.length>0;
    html+=`<button class="nav-item${has?' has-notes':''}${i===currentIdx?' active':''}" type="button" onclick="goTo(${i})">
      <div class="nav-dot"></div><span>${esc(s.title)}</span>
      ${has?`<span class="badge">${s.annotations.length}</span>`:''}
    </button>`;
  });
  sb.innerHTML=html;
}

function renderScreen(){
  const viewer=document.getElementById('screenViewer');
  viewer.innerHTML=screens.map((s,si)=>{
    const eager=Math.abs(si-currentIdx)<=1;
    const src=s.img_src||'';
    const pins=s.annotations.map((a,ni)=>
      `<button class="pin ${a.type}" type="button" style="left:${a.x}%;top:${a.y}%"
        onclick="openFeedback(${si},${ni})" id="pin-${si}-${ni}" title="${esc(a.label)}">${ni+1}</button>`
    ).join('');
    const note=s.annotations.length
      ?`${s.annotations.length} feedback point${s.annotations.length>1?'s':''} — click a pin to view.`
      :'No feedback notes on this screen.';
    return `<section class="review-card${si===currentIdx?' active-screen':''}" id="screen-${si}" data-screen-index="${si}">
      <div class="phone-wrapper">
        <div class="phone-frame">
          ${src?`<img src="${src}" class="phone-img" alt="${esc(s.title)}" loading="${eager?'eager':'lazy'}" decoding="async"/>`:'<div style="width:280px;height:560px;background:#f0ecf5;display:flex;align-items:center;justify-content:center;color:#7c6a8a;font-size:.8rem">No image</div>'}
          ${pins}
        </div>
        <div class="card-popup" id="cpopup-${si}"></div>
        </div>
      <div class="feedback-panel">
        <div class="screen-meta">${esc(s.section)} · Screen ${si+1} of ${screens.length}</div>
        <div class="screen-title-area"><h2>${esc(s.title)}</h2></div>
        <div class="empty-state"><p>${esc(note)}</p></div>
      </div>
    </section>`;
  }).join('');
  requestAnimationFrame(()=>document.querySelectorAll('.pin').forEach(p=>p.classList.add('ready')));
}

function setCurrent(idx,scroll=false){
  currentIdx=Math.max(0,Math.min(idx,screens.length-1));
  renderSidebar();updateNav();
  document.querySelectorAll('.review-card').forEach((c,i)=>c.classList.toggle('active-screen',i===currentIdx));
  if(scroll){const c=document.getElementById(`screen-${currentIdx}`);if(c)c.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
}

function openFeedback(si,ni){
  var note=screens[si].annotations[ni];if(!note)return;
  setCurrent(si,false);

  // Close any already-open popups
  closeInline();

  // Highlight pin
  document.querySelectorAll('.pin').forEach(function(p){p.classList.remove('active');});
  activePin=ni;
  var pinEl=document.getElementById('pin-'+si+'-'+ni);
  if(pinEl)pinEl.classList.add('active');

  var cpopup=document.getElementById('cpopup-'+si);
  if(!cpopup)return;

  // Build content
  cpopup.innerHTML='<article class="comment-card">'
    +'<div class="comment-top"><div>'
    +'<div class="comment-type '+note.type+'">'+(note.type==='content'?'Feature / Content':'UI / UX')+'</div>'
    +'<div class="comment-title">'+esc(note.label)+'</div>'
    +'</div><button class="comment-close" type="button" onclick="closeInline()">&#x2715;</button></div>'
    +'<div class="comment-label">What</div><div class="comment-copy">'+esc(note.what)+'</div>'
    +'<div class="comment-label">Why</div><div class="comment-copy">'+esc(note.why)+'</div>'
    +'</article>';

  // Measure phone-wrapper size to convert % coords to px
  var wrapper=document.querySelector('#screen-'+si+' .phone-wrapper');
  var wW=wrapper?wrapper.offsetWidth:270;
  var wH=wrapper?wrapper.offsetHeight:500;

  var pinX=(note.x/100)*wW;
  var pinY=(note.y/100)*wH;

  // Show hidden to measure height
  cpopup.style.display='block';
  cpopup.style.visibility='hidden';
  cpopup.style.left='-9999px';
  var popH=cpopup.offsetHeight;

  // Position right of pin, vertically centred, clamped within wrapper
  var left=pinX+18;
  var top=pinY-popH/2;
  if(top<0)top=4;
  if(top+popH>wH)top=wH-popH-4;

  cpopup.style.left=left+'px';
  cpopup.style.top=top+'px';
  cpopup.style.visibility='visible';
}

function closeInline(){
  activePin=null;
  document.querySelectorAll('.pin').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.card-popup').forEach(function(p){
    p.style.display='none';p.innerHTML='';
  });
}

function closeModal(e){
  if(e&&e.target!==e.currentTarget)return;
  const m=document.getElementById('feedbackModal');
  m.classList.remove('open');m.setAttribute('aria-hidden','true');
}

function goTo(idx){
  activePin=null;closeModal();closeInline();
  setCurrent(idx,true);
  const items=document.querySelectorAll('.nav-item');
  if(items[idx])items[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
}

function navigate(dir){const n=currentIdx+dir;if(n>=0&&n<screens.length)goTo(n);}

function updateNav(){}

function setupScroll(){
  const viewer=document.getElementById('screenViewer');
  let tick=false;
  viewer.addEventListener('scroll',()=>{
    if(tick)return;tick=true;
    requestAnimationFrame(()=>{
      const cx=viewer.getBoundingClientRect().left+viewer.clientWidth/2;
      let best=currentIdx,bestD=Infinity;
      document.querySelectorAll('.review-card').forEach(card=>{
        const r=card.getBoundingClientRect();
        const d=Math.abs((r.left+r.width/2)-cx);
        if(d<bestD){bestD=d;best=Number(card.dataset.screenIndex);}
      });
      if(best!==currentIdx){closeInline();setCurrent(best,false);}
      tick=false;
    });
  },{passive:true});
}

// ── Init ───────────────────────────────────────────────────────────────────
renderScreen();setCurrent(0,false);setupScroll();

// ── Password gate ────────────────────────────────────────────
// Focus on load + Enter key
document.addEventListener('DOMContentLoaded',function(){
  var el=document.getElementById('pwInput');
  if(el){
    setTimeout(function(){el.focus();},100);
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter') unlock();
    });
  }
});

function unlock(){
  var input=document.getElementById('pwInput');
  var err=document.getElementById('gateErr');
  var gate=document.getElementById('gate');
  if(!input||!gate)return;

  var val=input.value;
  if(val==='kurate2026'){
    // Hide error, start fade
    err.style.opacity='0';
    gate.style.transition='opacity 0.65s cubic-bezier(.4,0,.2,1)';
    gate.style.opacity='0';
    gate.style.pointerEvents='none';
    // Remove from DOM after fade completes
    setTimeout(function(){
      gate.style.display='none';
    },700);
  } else {
    // Wrong password — shake + red border
    input.classList.remove('shake','error');
    void input.offsetWidth; // force reflow to restart animation
    input.classList.add('shake','error');
    err.style.opacity='1';
    input.value='';
    input.focus();
    setTimeout(function(){
      input.classList.remove('error');
    },1400);
  }
}

var eyeVisible=false;
function toggleEye(){
  eyeVisible=!eyeVisible;
  document.getElementById('pwInput').type=eyeVisible?'text':'password';
  document.getElementById('eyeShow').style.display=eyeVisible?'none':'block';
  document.getElementById('eyeHide').style.display=eyeVisible?'block':'none';
}
// ── End gate ─────────────────────────────────────────────────

document.addEventListener('keydown',e=>{
  const open=document.getElementById('feedbackModal').classList.contains('open');
  if(e.key==='Escape'&&open){closeModal();return;}
  if(e.key==='Escape'&&activePin!==null){closeInline();return;}
  if(open)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
});
</script>
